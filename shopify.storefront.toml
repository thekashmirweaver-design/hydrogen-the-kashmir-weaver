# Storefront API permissions for the linked Hydrogen storefront.
# Required for quantityAvailable / tracked inventory on PDP and cart.
#
# Apply to Shopify Admin (Hydrogen channel):
#   Sales channels → Hydrogen → The Kashmir Weaver → Storefront settings
#   → Storefront API → Edit → enable scopes below → Save
#
# Then run: npm run storefront:push-scopes

storefront_id = "gid://shopify/HydrogenStorefront/1000154618"

[storefront_access_scopes]
scopes = "unauthenticated_read_product_listings,unauthenticated_read_product_inventory,unauthenticated_read_content,unauthenticated_read_customers,unauthenticated_write_checkouts,unauthenticated_read_checkouts"
